<div class="card">

  <div class="header">
    🧾 Order History
  </div>

  <!-- ✅ EMPTY -->
  <div *ngIf="orders.length === 0" class="empty">
    No orders yet
  </div>

  <!-- ✅ LIST -->
  <div *ngFor="let order of orders" class="order-card">

    <div class="order-header">
      <div>Order #{{ order.id }}</div>
      <div class="status">{{ order.status }}</div>
    </div>

    <div class="date">
      {{ order.createdAt | date:'medium' }}
    </div>

    <div class="items">
      <div *ngFor="let item of order.items" class="item">
        <span class="name">{{ item.menu.itemName }}</span>
        <span class="qty">{{ item.menu.price }} x {{ item.quantity }}</span>
      </div>
    </div>

    <div class="total">
      Total: ₹{{ order.totalAmount }}
    </div>

  </div>

</div>
