<div class="card">

  <div class="header">
    ❤️ Favorite Restaurants
  </div>

  <!-- ✅ EMPTY -->
  <div *ngIf="favorites.length === 0" class="empty">
    No favorite restaurants yet
  </div>

  <!-- ✅ LIST -->
  <div *ngFor="let fav of favorites" class="fav-row">

    <div class="fav-card">

      <div class="title">
        {{ fav.restaurant.restaurantName }}
      </div>

      <div class="location">
        📍 {{ fav.restaurant.location }}
      </div>

    </div>

    <!-- ✅ REMOVE -->
    <button class="remove-btn" (click)="removeFavorite(fav.id)">
      Remove
    </button>

  </div>

</div>
