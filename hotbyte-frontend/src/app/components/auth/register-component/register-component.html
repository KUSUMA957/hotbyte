<div class="page">
  <div class="card">

    <h2>Create Account 🚀</h2>

    <!-- ✅ ERRORS -->
    <ul class="error-list" *ngIf="errorsList.length">
      <li *ngFor="let e of errorsList">{{ e }}</li>
    </ul>

    <!-- ✅ SUCCESS -->
    <p class="success-msg" *ngIf="message">{{ message }}</p>

    <form [formGroup]="form">

      <div class="form-group">
        <input placeholder="Full Name" formControlName="name" />
      </div>

      <div class="form-group">
        <input placeholder="Email" formControlName="email" />
      </div>

      <div class="form-group">
        <input type="password" placeholder="Password" formControlName="password" />
      </div>

      <div class="form-group">
        <input placeholder="Phone" formControlName="phone" />
      </div>

      <div class="form-group">
        <input placeholder="Address" formControlName="address" />
      </div>

      <div class="form-group">
        <select formControlName="role">
          <option value="USER">User</option>
          <option value="RESTAURANT">Restaurant</option>
        </select>
      </div>

      <div *ngIf="form.get('role')?.value === 'RESTAURANT'">

        <div class="form-group">
          <input placeholder="Restaurant Name" formControlName="restaurantName" />
        </div>

        <div class="form-group">
          <input placeholder="Location" formControlName="location" />
        </div>

      </div>

      <button type="button" (click)="register()">
        Register
      </button>

    </form>

  </div>
</div>
